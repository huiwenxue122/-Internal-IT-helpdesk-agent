services:
  - type: web
    name: gaggia-agent
    env: docker
    plan: free
    autoDeploy: false
    envVars:
      # ── Deployment-safe defaults ─────────────────────────────────────────
      # keyword backend: pure-Python lexical retrieval, no Chroma, no ONNX.
      # Fits comfortably within Render's free-tier 512 MB memory limit.
      - key: RETRIEVER_BACKEND
        value: keyword
      - key: POLICY_GRAPH_BACKEND
        value: memory
      - key: BUILD_INDEX_ON_STARTUP
        value: "false"

      # ── LLM (optional) ───────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514

      # ── LangSmith tracing (optional) ─────────────────────────────────────
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: gaggia-agent

      # ── Neo4j (optional, disabled by default) ────────────────────────────
      # Set POLICY_GRAPH_BACKEND=neo4j and provide credentials to enable.
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false

      # ── Chroma (optional, disabled by default) ───────────────────────────
      # Set RETRIEVER_BACKEND=chroma and CHROMA_PERSIST_PATH to enable.
      # Note: Chroma requires the index to be pre-built offline.
      - key: CHROMA_PERSIST_PATH
        value: /tmp/chroma_db

[pytest]
# Suppress deprecation warnings originating from third-party libraries only.
# Application warnings (gaggia_agent.*) are intentionally NOT suppressed.
filterwarnings =
    ignore::DeprecationWarning:pydantic.*:
    ignore::DeprecationWarning:pydantic_core.*:
    ignore::DeprecationWarning:langchain.*:
    ignore::DeprecationWarning:langchain_core.*:
    ignore::DeprecationWarning:langgraph.*:

# Official 21 take-home evaluation scenarios for GaggiaAgent.
# Each scenario exercises a specific policy domain.

- id: official_001
  name: "Blue standard password reset"
  category: password_reset
  trust_tier: blue
  user_id: EMP-2011
  requester_profile:
    employee_id: EMP-2011
    name: Standard Employee
    department: Operations
    team: Operations
    is_manager: false
    reports: []
    verified: true
  message: "Hi, I forgot my password. Can you reset it for me?"
  expected:
    verdict: allow
    allowed_tools:
      - reset_password
    forbidden_tools: []
    required_citations:
      - "2.1"
      - "2.3"
    required_response_substrings:
      - "24 hours"
    forbidden_response_substrings: []
    required_redacted_fields: []
    notes: "Standard employee self-service password reset. Temp password expires in 24 hours."

